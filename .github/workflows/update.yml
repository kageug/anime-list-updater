name: Update anime list

on:
  schedule:
    # 毎日 17:00 UTC = 翌 02:00 JST に実行 (anison-rankin daily.yml の 03:00 JST より前)
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      seasons:
        description: "Seasons spec (current,next,all,spring,summer,autumn,winter)"
        required: false
        default: "current,next"
      skip_youtube:
        description: "Skip YouTube search"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # commit & push に必要

concurrency:
  group: update-anime-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater
        env:
          PYTHONUTF8: '1'
          SEASONS: ${{ github.event.inputs.seasons || 'current,next' }}
          SKIP_YOUTUBE: ${{ github.event.inputs.skip_youtube || 'false' }}
        run: |
          if [ "$SKIP_YOUTUBE" = "true" ]; then
            python -m src.main --seasons "$SEASONS" --skip-youtube
          else
            python -m src.main --seasons "$SEASONS"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name  "anime-list-bot"
          git config user.email "anime-list-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "auto: anime list update ${DATE}"
            git push
          fi

      # ── 未作成アニメの残リスト更新（ページ生成はしない・API不使用） ──
      # 方針: 新作ページは「ユーザーが /new-anime-pages スキルを呼んだ時だけ」私(Claude)が手作りする。
      # 毎日のここでは「新作だが未だページが無いアニメ」の残リストだけを最新化してコミットする。
      # 必要なのは web repo の生成済み台帳(auto_anime_registry.json)と pending.py の2ファイルのみ。
      # 巨大DBを含む web repo を丸ごとcloneせず、GitHub contents API で2ファイルだけ取得して計算する。
      - name: Refresh pending (un-generated) anime list
        if: ${{ always() }}
        env:
          GH_PAT_WEB: ${{ secrets.GH_PAT_WEB }}
          PYTHONUTF8: '1'
        run: |
          set -e
          mkdir -p /tmp/webroot/data /tmp/tools
          REPO="kageug/flask-anisong-ranking-app"
          # 台帳と pending.py を contents API(raw) で取得。失敗しても続行(台帳空=全件を残として扱う)。
          fetch() {  # $1=repo path  $2=dest
            curl -fsSL -H "Accept: application/vnd.github.raw" \
              ${GH_PAT_WEB:+-H "Authorization: Bearer ${GH_PAT_WEB}"} \
              "https://api.github.com/repos/${REPO}/contents/$1" -o "$2"
          }
          fetch "data/auto_anime_registry.json" /tmp/webroot/data/auto_anime_registry.json \
            || echo '{}' > /tmp/webroot/data/auto_anime_registry.json
          if ! fetch "tools/auto_anime/pending.py" /tmp/tools/pending.py; then
            echo "pending.py 取得失敗 → スキップ"; exit 0
          fi
          python /tmp/tools/pending.py \
            --anime-csv data/anime_list.csv \
            --web-root /tmp/webroot \
            --out data/pending_new_anime.json --print
          git add data/pending_new_anime.json
          if git diff --cached --quiet; then
            echo "残リストに変化なし"
          else
            git config user.name  "anime-list-bot"
            git config user.email "anime-list-bot@users.noreply.github.com"
            git commit -m "auto: refresh pending new-anime list $(date -u +%Y-%m-%d)"
            git push
            echo "残リストを更新しました"
          fi
