name: Update anime list

on:
  schedule:
    # 毎日 21:00 UTC = 06:00 JST に実行
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      seasons:
        description: "Seasons spec (current,next,all,spring,summer,autumn,winter)"
        required: false
        default: "current,next"
      skip_youtube:
        description: "Skip YouTube search"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # commit & push に必要

concurrency:
  group: update-anime-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater
        env:
          PYTHONUTF8: '1'
          SEASONS: ${{ github.event.inputs.seasons || 'current,next' }}
          SKIP_YOUTUBE: ${{ github.event.inputs.skip_youtube || 'false' }}
        run: |
          if [ "$SKIP_YOUTUBE" = "true" ]; then
            python -m src.main --seasons "$SEASONS" --skip-youtube
          else
            python -m src.main --seasons "$SEASONS"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name  "anime-list-bot"
          git config user.email "anime-list-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "auto: anime list update ${DATE}"
            git push
          fi
